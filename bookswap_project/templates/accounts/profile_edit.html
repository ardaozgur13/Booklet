{% extends 'base.html' %}
{% block title %}Profili Düzenle{% endblock %}
{% block content %}
<div class="form-box form-box-wide" style="margin-top:1rem;">
  <div class="form-title"><h2>Profili Düzenle</h2></div>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group"><label class="form-label">Ad</label><input type="text" name="first_name" class="form-control" value="{{ form.first_name.value|default:'' }}"></div>
      <div class="form-group"><label class="form-label">Soyad</label><input type="text" name="last_name" class="form-control" value="{{ form.last_name.value|default:'' }}"></div>
    </div>
    <div class="form-group"><label class="form-label">E-posta</label><input type="email" name="email" class="form-control" value="{{ form.email.value|default:'' }}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Şehir</label><input type="text" name="city" class="form-control" value="{{ form.city.value|default:'' }}"></div>
      <div class="form-group"><label class="form-label">Telefon</label><input type="text" name="phone" class="form-control" value="{{ form.phone.value|default:'' }}"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Cinsiyet</label>
      <select name="gender" class="form-control">
        <option value="">Seçiniz</option>
        <option value="E" {% if form.gender.value == 'E' %}selected{% endif %}>Erkek</option>
        <option value="K" {% if form.gender.value == 'K' %}selected{% endif %}>Kadın</option>
        <option value="B" {% if form.gender.value == 'B' %}selected{% endif %}>Belirtmek istemiyorum</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Profil Fotoğrafı</label>
      {% if request.user.profile_photo %}<div style="margin-bottom:.5rem;"><img src="{{ request.user.profile_photo.url }}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;"></div>{% endif %}
      <input type="file" name="profile_photo" class="form-control" accept="image/*">
    </div>
    <div style="display:flex;gap:.75rem;margin-top:.5rem;">
      <button type="submit" class="btn btn-primary">Kaydet</button>
      <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">İptal</a>
    </div>
  </form>
</div>
{% endblock %}
