{% extends 'base.html' %}
{% block title %}Giriş Yap{% endblock %}
{% block content %}
<div class="form-box" style="margin-top:2rem;">
  <div class="form-title"><h2>📚 Giriş Yap</h2><p class="text-muted">BookSwap hesabına giriş yap</p></div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Kullanıcı Adı</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label">Şifre</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    {% if form.errors %}<div class="form-error" style="margin-bottom:1rem;">Kullanıcı adı veya şifre hatalı.</div>{% endif %}
    <button type="submit" class="btn btn-primary btn-full">Giriş Yap</button>
  </form>
  <p class="text-muted" style="text-align:center;margin-top:1.25rem;">Hesabın yok mu? <a href="{% url 'accounts:register' %}">Kayıt Ol</a></p>
</div>
{% endblock %}
