{% extends 'base.html' %}
{% block title %}Kitabı Sil{% endblock %}
{% block content %}
<div class="form-box" style="margin-top:2rem;text-align:center;">
  <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
  <h2 style="margin-bottom:.5rem;">Kitabı Sil</h2>
  <p class="text-muted" style="margin-bottom:1.5rem;"><strong>{{ book.title }}</strong> adlı kitabı silmek istediğinizden emin misiniz? Bu işlem geri alınamaz.</p>
  <form method="post" style="display:flex;gap:.75rem;justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Evet, Sil</button>
    <a href="{% url 'books:my_library' %}" class="btn btn-secondary">İptal</a>
  </form>
</div>
{% endblock %}
